server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:47.97.114.189}:${DB_PORT:5432}/${DB_NAME:code_insight}?stringtype=unspecified
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

code-insight:
  ai:
    mock: ${LLM_MOCK:true}
    api-key: ${LLM_API_KEY:}
    api-url: ${LLM_API_URL:https://api.minimax.io/v1}
    model-name: ${LLM_MODEL_NAME:MiniMax-M3}
    hierarchy-parallelism: ${AI_HIERARCHY_PARALLELISM:4}
  token:
    limit-enabled: ${TOKEN_LIMIT_ENABLED:true}
    task-limit: ${TOKEN_TASK_LIMIT:100000}
    system-monthly-limit: ${TOKEN_SYSTEM_MONTHLY_LIMIT:1000000}
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./storage}
  push:
    queue:
      enabled: ${PUSH_QUEUE_ENABLED:true}
    scheduler:
      poll-interval-ms: ${PUSH_SCHEDULER_INTERVAL:2000}
    git:
      commit-prefix: ${PUSH_GIT_COMMIT_PREFIX:docs: add code-insight knowledge}
    s3:
      enabled: ${PUSH_S3_ENABLED:false}
