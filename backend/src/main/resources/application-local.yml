server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:code_insight}?stringtype=unspecified
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      encoding: UTF-8
  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

code-insight:
  ai:
    mock: ${LLM_MOCK:true}
    api-key: ${LLM_API_KEY:}
    api-url: ${LLM_API_URL:https://api.minimax.io/v1}
    model-name: ${LLM_MODEL_NAME:MiniMax-M3}
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./storage}
