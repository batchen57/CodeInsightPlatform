server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

code-insight:
  ai:
    mock: ${LLM_MOCK:true}
    api-key: ${LLM_API_KEY:}
    api-url: ${LLM_API_URL:https://api.minimax.io/v1}
    model-name: ${LLM_MODEL_NAME:MiniMax-M3}
  token:
    limit-enabled: ${TOKEN_LIMIT_ENABLED:true}
    task-limit: ${TOKEN_TASK_LIMIT:100000}
    system-monthly-limit: ${TOKEN_SYSTEM_MONTHLY_LIMIT:1000000}
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./storage}
