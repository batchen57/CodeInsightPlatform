spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:code_insight_test}?stringtype=unspecified
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# 自定义配置
code-insight:
  ai:
    mock: true
  storage:
    local-path: ./storage_test
